server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — bilinmeyen route'lar index.html'e döner
    # (React'ın client-side routing'i ile uyumlu)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/* isteklerini backend container'ına proxy'le
    # (frontend ve backend aynı network'te, "backend" container adıyla erişilir)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Statik asset'ler için cache header
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}