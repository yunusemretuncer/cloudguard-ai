services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudguard-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
      - APP_ENV=production
      - DATABASE_URL=sqlite:////app/data/cloudguard.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudguard-frontend
    ports:
      - "5173:80"   # local 5173 → nginx 80
    depends_on:
      - backend
    restart: unless-stopped